name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
            artifact_name: ai-proxy-macos
          - name: Windows
            runner: windows-latest
            artifact_name: ai-proxy-windows

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Verify pnpm is available
        run: pnpm --version

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Tauri uses platform-native toolchains on each runner.
      # This workflow only builds unsigned artifacts and uploads them as workflow artifacts.
      - name: Build desktop app
        run: pnpm tauri build

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: src-tauri/target/release/bundle
          if-no-files-found: error
