name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.2). Triggers: bump → commit → tag → build.'
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    name: Bump Version
    if: github.event_name == 'workflow_dispatch' && inputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version files
        run: bash scripts/bump-version.sh "${{ inputs.version }}"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore(release): v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:main "v${{ inputs.version }}"

  build:
    name: Build ${{ matrix.platform.name }}
    needs: [bump]
    if: always() && needs.bump.result != 'failure'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
            artifact_name: ai-proxy-macos
          - name: Windows
            runner: windows-latest
            artifact_name: ai-proxy-windows

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' && format('v{0}', inputs.version) || github.ref }}

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(grep '"version"' package.json | head -1 | grep -o '"[^"]*"$' | tr -d '"')
          echo "Tag version: $VERSION, Package version: $PKG_VERSION"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "WARNING: Tag version $VERSION != package version $PKG_VERSION"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Verify pnpm is available
        run: pnpm --version

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Tauri uses platform-native toolchains on each runner.
      # This workflow only builds unsigned artifacts and uploads them as workflow artifacts.
      - name: Build desktop app
        run: pnpm tauri build

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: src-tauri/target/release/bundle
          if-no-files-found: error

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download desktop bundles
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show downloaded files
        run: |
          echo "Downloaded release artifact files:"
          find release-artifacts -type f | sort

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || '' }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.app.tar.gz
            release-artifacts/**/*.app.tar.gz.sig
            release-artifacts/**/*.msi
            release-artifacts/**/*.msi.zip
            release-artifacts/**/*.msi.zip.sig
            release-artifacts/**/*setup.exe
            release-artifacts/**/*setup.nsis.zip
            release-artifacts/**/*setup.nsis.zip.sig
            release-artifacts/**/*.sig
            release-artifacts/**/latest*.json
