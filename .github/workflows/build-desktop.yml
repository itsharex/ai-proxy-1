name: Build Desktop App

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.2). Triggers: bump → commit → tag → build.'
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    name: Bump Version
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.version != '') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve next version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            LATEST=$(git tag --sort=-v:refname | head -1)
            LATEST="${LATEST#v}"
            echo "Latest tag version: $LATEST"
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $VERSION"

      - name: Bump version files
        run: bash scripts/bump-version.sh "${{ steps.resolve.outputs.version }}"

      - name: Commit and tag
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:main "v${VERSION}"

  build:
    name: Build ${{ matrix.platform.name }}
    needs: [bump]
    if: always() && needs.bump.result != 'failure'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
          - name: Windows
            runner: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.version != '' && format('v{0}', needs.bump.outputs.version) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Verify pnpm is available
        run: pnpm --version

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: ai-proxy-${{ matrix.platform.name }}
          path: src-tauri/target/release/bundle
          if-no-files-found: error

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v') || needs.bump.outputs.version != ''
    needs: [build, bump]
    runs-on: ubuntu-latest

    steps:
      - name: Download desktop bundles
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show downloaded files
        run: |
          echo "Downloaded release artifact files:"
          find release-artifacts -type f | sort

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.version && format('v{0}', needs.bump.outputs.version) || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.app.tar.gz
            release-artifacts/**/*.app.tar.gz.sig
            release-artifacts/**/*.msi
            release-artifacts/**/*.msi.zip
            release-artifacts/**/*.msi.zip.sig
            release-artifacts/**/*setup.exe
            release-artifacts/**/*setup.nsis.zip
            release-artifacts/**/*setup.nsis.zip.sig
            release-artifacts/**/*.sig
            release-artifacts/**/latest*.json
