name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
            artifact_name: ai-proxy-macos
          - name: Windows
            runner: windows-latest
            artifact_name: ai-proxy-windows

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version to: $VERSION"
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          rm -f package.json.bak src-tauri/tauri.conf.json.bak
          echo "package.json version: $(grep '"version"' package.json)"
          echo "tauri.conf.json version: $(grep '"version"' src-tauri/tauri.conf.json)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Verify pnpm is available
        run: pnpm --version

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Tauri uses platform-native toolchains on each runner.
      # This workflow only builds unsigned artifacts and uploads them as workflow artifacts.
      - name: Build desktop app
        run: pnpm tauri build

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: src-tauri/target/release/bundle
          if-no-files-found: error

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download desktop bundles
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show downloaded files
        run: |
          echo "Downloaded release artifact files:"
          find release-artifacts -type f | sort

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.app.tar.gz
            release-artifacts/**/*.app.tar.gz.sig
            release-artifacts/**/*.msi
            release-artifacts/**/*.msi.zip
            release-artifacts/**/*.msi.zip.sig
            release-artifacts/**/*setup.exe
            release-artifacts/**/*setup.nsis.zip
            release-artifacts/**/*setup.nsis.zip.sig
            release-artifacts/**/*.sig
            release-artifacts/**/latest*.json
